[pytest]
# Pytest configuration file

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (requires external services)
    slow: Slow-running tests
    api: API integration tests (requires backend server)

# Logging
log_cli = true
log_cli_level = INFO

# Coverage options (if using pytest-cov)
# addopts = --cov=backend --cov-report=html --cov-report=term
